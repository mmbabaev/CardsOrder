receivers:
  otlp:
    protocols:
      grpc:   # порт 4317
      http:   # порт 4318 — сюда шлёт Python SDK

processors:
  batch:

exporters:
  otlp/monium:
    compression: zstd
    endpoint: ingest.monium.yandex.cloud:443
    headers:
      Authorization: "Api-Key ${env:MONIUM_API_KEY}"
      x-monium-project: "${env:MONIUM_PROJECT}"
  debug:
    verbosity: detailed

service:
  pipelines:
    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp/monium, debug ]

  telemetry:
    logs:
      level: info
