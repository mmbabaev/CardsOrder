name: PR

on:
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/e2e
        env:
          PYTHONPATH: .

  deploy-debug:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh-key-kara
          chmod 600 ~/.ssh/ssh-key-kara
          ssh-keyscan -H 158.160.9.28 >> ~/.ssh/known_hosts

      - name: Write .env.debug file
        run: echo "${{ secrets.ENV_FILE_DEBUG }}" > bot/.env.debug

      - name: Deploy
        run: echo "y" | bash bot/deploy_bot_debug.sh
